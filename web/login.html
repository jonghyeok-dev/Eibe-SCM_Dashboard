<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EIBE SCM Dashboard - Login">
    <title>EIBE SCM | Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">EI</div>
            <h1>EIBE SCM</h1>
            <p class="login-sub">Supply Chain Management System</p>

            <div id="login-error" class="login-error">
                아이디 또는 비밀번호가 틀렸습니다.
            </div>

            <form id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group" style="margin-bottom: var(--space-md);">
                    <label class="form-label">아이디</label>
                    <input type="text" id="login-id" class="form-input" placeholder="아이디를 입력하세요" autocomplete="username" required>
                </div>
                <div class="form-group" style="margin-bottom: var(--space-xl);">
                    <label class="form-label">비밀번호</label>
                    <input type="password" id="login-pw" class="form-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn--primary" style="width: 100%; padding: 10px;" id="login-btn">
                    로그인
                </button>
            </form>

            <div style="margin-top: var(--space-xl); text-align: center;">
                <button class="theme-toggle" onclick="toggleLoginTheme()" style="width: auto; padding: 6px 16px;">
                    <span class="toggle-icon">☾</span>
                    <span class="theme-toggle-text">Dark</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 테마 적용
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateLoginThemeBtn(savedTheme);

        // 이미 로그인 된 상태면 대시보드로
        if (localStorage.getItem('scm_token')) {
            window.location.href = '/';
        }

        function toggleLoginTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateLoginThemeBtn(next);
        }

        function updateLoginThemeBtn(theme) {
            const icon = document.querySelector('.toggle-icon');
            const text = document.querySelector('.theme-toggle-text');
            if (icon) icon.textContent = theme === 'dark' ? '☀' : '☾';
            if (text) text.textContent = theme === 'dark' ? 'Light' : 'Dark';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-id').value.trim();
            const password = document.getElementById('login-pw').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '로그인 중...';

            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                if (!res.ok) throw new Error('Login failed');
                const data = await res.json();
                localStorage.setItem('scm_token', data.access_token);
                window.location.href = '/';
            } catch (err) {
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '로그인';
            }
        }
    </script>
</body>
</html>
