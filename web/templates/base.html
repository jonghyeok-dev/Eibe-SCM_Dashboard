<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EIBE SCM Dashboard - 전사 재고 관리 및 통합 SCM 파이프라인">
    <title>EIBE SCM | {{ title | default('대시보드') }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
    <script>
        if (!localStorage.getItem('scm_token') && window.location.pathname !== '/login') {
            window.location.replace('/login');
        }
    </script>
</head>
<body>
    <div id="global-loader">
        <div class="spinner"></div>
    </div>
    <div class="app-wrapper">
        <aside class="app-sidebar">
            <button class="sidebar-toggle-btn" onclick="Sidebar.toggle()" title="사이드바 접기/펼치기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <div class="sidebar-brand">
                <img src="/static/img/eibelogo.png" alt="EIBE" class="sidebar-logo-img">
                <h1>EIBE SCM</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span><span>대시보드</span></a>
                <div class="nav-group {% if active_page == 'inventory' %}expanded{% endif %}">
                    <a href="/inventory" class="nav-parent {% if active_page == 'inventory' and not tab %}active{% endif %}"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span><span>현재고 관리</span></a>
                    <div class="nav-sub">
                        <a href="/inventory" class="{% if active_page == 'inventory' and not tab %}active{% endif %}">현재고 상세</a>
                        <a href="/inventory/transfer" class="{% if active_page == 'inventory' and tab == 'transfer' %}active{% endif %}">이관 계획</a>
                    </div>
                </div>
                <a href="/expiry" class="{% if active_page == 'expiry' %}active{% endif %}"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span><span>유통기한 추적</span></a>
                <a href="/order-plan" class="{% if active_page == 'order_plan' %}active{% endif %}"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span>발주 시뮬레이터</span></a>
                <a href="/matching" class="{% if active_page == 'matching' %}active{% endif %}"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4a2 2 0 012 2v9a2 2 0 01-2 2H8a2 2 0 01-2-2v-4"/></svg></span><span>입고 파이프라인</span></a>
                <a href="/users" class="{% if active_page == 'users' %}active{% endif %}"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span><span>시스템 설정</span></a>
            </nav>
            <div class="sidebar-user-info">
                <div class="user-avatar">U</div>
                <div class="user-meta">
                    <div class="user-name">로딩 중...</div>
                    <div class="user-role">-</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="theme-toggle" onclick="Theme.toggle()">
                    <span class="toggle-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
                    <span class="theme-toggle-text">Dark</span>
                </button>
                <button class="btn btn--secondary btn--sm" onclick="Auth.logout()" style="width:100%; text-align:center;">로그아웃</button>
            </div>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- 공통 알림 모달/토스트 영역 (필요시) -->
    {% block scripts %}{% endblock %}
</body>
</html>
