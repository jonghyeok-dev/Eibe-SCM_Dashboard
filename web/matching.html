    <script src="/static/js/app.js"></script>
    <script>
        const Matching = {
            orders: [],
            productions: [],
            invoices: [],
            selected: { order: null, production: null, invoice: null },

            async load() {
                try {
                    await Promise.all([
                        this.loadOrders(),
                        this.loadProductions(),
                        this.loadInvoices(),
                        this.loadMatchingStatus(),
                    ]);
                } catch(e) { console.error(e); }
            },

            async loadOrders() {
                try {
                    const data = await API.get('/api/orders');
                    this.orders = data;
                    const tbody = document.querySelector('#order-qty-table tbody');
                    document.getElementById('order-count').textContent = `${data.length}кұ?;
                    if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">?ұлЎқ??л°ңмЈјк°Җ ?ҶмҠө?ҲлӢӨ.</td></tr>'; return; }
                    tbody.innerHTML = data.map(d => {
                        const matched = d.matched_productions?.length > 0;
                        return `
                        <tr onclick="Matching.selectRow('order', ${d.id}, this)" data-id="${d.id}" class="${matched ? 'matched-row' : ''}">
                            <td><input type="checkbox" class="match-checkbox"></td>
                            <td class="mono">${d.product_code}</td>
                            <td>${d.order_month}</td>
                            <td class="text-right mono" style="font-weight:600;">${Format.number(d.order_qty)}</td>
                            <td><span class="status-badge ${matched ? 'status-done' : 'status-pending'}">${matched ? 'л§Өм№ӯ?? : 'лҜёл§Өм№?}</span></td>
                        </tr>`;
                    }).join('');
                } catch(e) { console.error(e); }
            },

            async loadProductions() {
                try {
                    const data = await API.get('/api/productions');
                    this.productions = data;
                    const tbody = document.querySelector('#production-table tbody');
                    document.getElementById('production-count').textContent = `${data.length}кұ?;
                    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty-state">?ұлЎқ???қмӮ° ?°мқҙ?°к? ?ҶмҠө?ҲлӢӨ.</td></tr>'; return; }
                    tbody.innerHTML = data.map(d => {
                        const matched = d.matched_order_id != null;
                        return `
                        <tr onclick="Matching.selectRow('production', ${d.id}, this)" data-id="${d.id}" class="${matched ? 'matched-row' : ''}">
                            <td><input type="checkbox" class="match-checkbox"></td>
                            <td class="mono">${d.product_code}</td>
                            <td class="mono">${d.purchase_code}</td>
                            <td class="mono">${d.production_code}</td>
                            <td class="text-right mono" style="font-weight:600;">${Format.number(d.production_qty)}</td>
                            <td><span class="status-badge ${matched ? 'status-done' : 'status-pending'}">${matched ? 'л§Өм№ӯ?? : 'лҜёл§Өм№?}</span></td>
                        </tr>`;
                    }).join('');
                } catch(e) { console.error(e); }
            },

            async loadInvoices() {
                try {
                    const data = await API.get('/api/invoices');
                    this.invoices = data;
                    const tbody = document.querySelector('#invoice-table tbody');
                    document.getElementById('invoice-count').textContent = `${data.length}кұ?;
                    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty-state">?ұлЎқ???ёліҙ?ҙмҠӨ ?°мқҙ?°к? ?ҶмҠө?ҲлӢӨ.</td></tr>'; return; }
                    tbody.innerHTML = data.map(d => {
                        const matched = d.matched_production_id != null;
                        return `
                        <tr onclick="Matching.selectRow('invoice', ${d.id}, this)" data-id="${d.id}" class="${matched ? 'matched-row' : ''}">
                            <td><input type="checkbox" class="match-checkbox"></td>
                            <td class="mono">${d.invoice_no}</td>
                            <td class="mono">${d.purchase_code || '-'}</td>
                            <td class="mono">${d.product_code || '-'}</td>
                            <td class="text-right mono" style="font-weight:600;">${d.carton_qty || '-'}</td>
                            <td><span class="status-badge ${matched ? 'status-done' : 'status-pending'}">${matched ? 'л§Өм№ӯ?? : 'лҜёл§Өм№?}</span></td>
                        </tr>`;
                    }).join('');
                } catch(e) { console.error(e); }
            },

            async loadMatchingStatus() {
                try {
                    const data = await API.get('/api/matching/status');
                    const tbody = document.querySelector('#matching-status-table tbody');
                    if (!data || !data.length) {
                        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">л§Өм№ӯ???°мқҙ?°к? ?ҶмҠө?ҲлӢӨ.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = data.map(d => `
                        <tr>
                            <td class="mono">${d.order_id || '-'}</td>
                            <td class="mono">${d.product_code || '-'}</td>
                            <td>${d.order_month || '-'}</td>
                            <td class="text-right mono">${d.order_qty ? Format.number(d.order_qty) : '-'}</td>
                            <td class="mono" style="color:var(--accent-main);">${d.production_code || '-'}</td>
                            <td class="text-right mono">${d.production_qty ? Format.number(d.production_qty) : '-'}</td>
                            <td class="mono" style="color:var(--accent-amber);">${d.invoice_no || '-'}</td>
                            <td class="text-right mono">${d.carton_qty || '-'}</td>
                        </tr>
                    `).join('');
                } catch(e) { console.error(e); }
            },

            selectRow(type, id, rowEl) {
                const tableId = type === 'order' ? 'order-qty-table' : type === 'production' ? 'production-table' : 'invoice-table';
                const table = document.getElementById(tableId);

                if (this.selected[type] === id) {
                    this.selected[type] = null;
                    rowEl.classList.remove('selected-row');
                    rowEl.querySelector('.match-checkbox').checked = false;
                } else {
                    table.querySelectorAll('tr.selected-row').forEach(r => {
                        r.classList.remove('selected-row');
                        const cb = r.querySelector('.match-checkbox');
                        if (cb) cb.checked = false;
                    });
                    this.selected[type] = id;
                    rowEl.classList.add('selected-row');
                    rowEl.querySelector('.match-checkbox').checked = true;
                }
                this.updateActionBar();
            },

            updateActionBar() {
                const count = [this.selected.order, this.selected.production, this.selected.invoice].filter(v => v !== null).length;
                const summary = document.getElementById('selection-summary');
                const btn = document.getElementById('btn-create-match');

                if (count === 0) {
                    summary.innerHTML = 'к°??Ңмқҙлё”м—җ??л§Өм№ӯ????Ә©??? нғқ?ҳм„ё??(2~3к°??Ңмқҙлё”м—җ??к°?1кұҙм”©)';
                    btn.disabled = true;
                } else if (count === 1) {
                    summary.innerHTML = `<strong>${count}кұ?/strong> ? нғқ????мөңмҶҢ 2к°??Ңмқҙлё”м—җ??? нғқ?ҙм•ј л§Өм№ӯ?????ҲмҠө?ҲлӢӨ`;
                    btn.disabled = true;
                } else {
                    summary.innerHTML = `<strong>${count}кұ?/strong> ? нғқ????л§Өм№ӯ к°Җ?Ҙн•©?ҲлӢӨ`;
                    btn.disabled = false;
                }
            },

            clearSelections() {
                this.selected = { order: null, production: null, invoice: null };
                document.querySelectorAll('.matching-panel tr.selected-row').forEach(r => {
                    r.classList.remove('selected-row');
                    const cb = r.querySelector('.match-checkbox');
                    if (cb) cb.checked = false;
                });
                this.updateActionBar();
            },

            async createMatch() {
                const count = [this.selected.order, this.selected.production, this.selected.invoice].filter(v => v !== null).length;
                if (count < 2) { Toast.show('мөңмҶҢ 2к°??Ңмқҙлё”м—җ????Ә©??? нғқ?ҳм„ё??); return; }

                const matchData = {
                    order_id: this.selected.order,
                    production_id: this.selected.production,
                    invoice_id: this.selected.invoice,
                };

                try {
                    const result = await API.post('/api/matching/link', matchData);
                    Toast.show(result.message || 'л§Өм№ӯ ?„лЈҢ', 'success');
                    this.clearSelections();
                    this.load();
                } catch(e) {
                    Toast.show('л§Өм№ӯ ?ӨнҢЁ: ' + (e.message || '?ңлІ„ ?ӨлҘҳ'), 'error');
                }
            },
        };

        document.addEventListener('DOMContentLoaded', () => {
            Theme.init();
            Matching.load();
        });
    </script>
