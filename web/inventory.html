<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIBE SCM | 현재고 현황</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        if (!localStorage.getItem('scm_token') && window.location.pathname !== '/login') {
            window.location.replace('/login');
        }
    </script>
</head>
<body>
    <div class="app-wrapper">
        <aside class="app-sidebar">
            <button class="sidebar-toggle-btn" onclick="Sidebar.toggle()" title="사이드바 접기/펼치기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <div class="sidebar-brand">
                <img src="/static/img/eibelogo.png" alt="EIBE" class="sidebar-logo-img">
                <h1>EIBE SCM</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item"><i class="ti ti-dashboard"></i>대시보드</a>
                <a href="/inventory" class="nav-item active"><i class="ti ti-box"></i>현재고</a>
                <a href="/expiry" class="nav-item"><i class="ti ti-calendar-time"></i>유통기한</a>
                <a href="/order_plan" class="nav-item"><i class="ti ti-report-analytics"></i>발주</a>
                <a href="/matching" class="nav-item"><i class="ti ti-truck-return"></i>입고</a>
                <a href="/users" class="nav-item"><i class="ti ti-settings"></i>설정</a>
            </nav>
            <div class="sidebar-user-info">
                <div class="user-avatar">U</div>
                <div class="user-meta">
                    <div class="user-name">로딩 중...</div>
                </div>
            </div>
            <!-- Modern Filter Component -->
            <div id="warehouse-filter-container"></div>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="theme-toggle" onclick="Theme.toggle()">
                    <span class="toggle-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
                    <span class="theme-toggle-text">Dark</span>
                </button>
                <button class="btn btn--secondary btn--sm" onclick="Auth.logout()" style="width:100%; text-align:center;">로그아웃</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title" id="main-page-title">현재고 상세</h1>
                    <p class="page-subtitle" id="main-page-subtitle">창고별 현재고 보유량 및 관리</p>
                </div>
            </div>


            <!-- KPI 요약 -->
            <section class="kpi-grid section-gap" id="inventory-kpi">
                <div class="kpi-card">
                    <span class="kpi-label">전사 총 현재고</span>
                    <div class="kpi-value" id="inv-total-qty">0</div>
                    <div class="kpi-sub">캔 (전 창고 합계)</div>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">재고 자산 금액</span>
                    <div class="kpi-value" id="inv-total-value">₩0</div>
                    <div class="kpi-sub">원화 환산 총액</div>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">등록 창고 수</span>
                    <div class="kpi-value" id="inv-ffc-count">0</div>
                    <div class="kpi-sub">풀필먼트 창고</div>
                </div>
            </section>

            <!-- 창고별 현재고 상세 테이블 -->
            <section class="card" id="inventory-detail-section">
                <div class="card-header">
                    <h2 class="card-title">창고별 현재고 상세</h2>
                    <div class="btn-group">
                        <button class="btn btn--secondary btn--sm" onclick="downloadTemplate('inventory_snapshot')">양식 다운로드</button>
                        <input type="file" id="inventory-upload" accept=".xlsx" style="display: none;">
                        <button class="btn btn--primary btn--sm" onclick="document.getElementById('inventory-upload').click()">엑셀 업로드</button>
                        <button class="btn btn--primary btn--sm" onclick="InventoryPage.showManageModal()">+ 재고 추가</button>
                        <button class="btn btn--secondary btn--sm" onclick="InventoryPage.load()">새로고침</button>
                    </div>
                </div>
                <div class="card-body" style="padding-bottom: 0;">
                    <div class="checkbox-filter-group" id="ffc-checkbox-filter"></div>
                </div>
                <div class="card-body card-body--no-pad">
                    <div class="data-table-wrapper">
                        <table class="data-table" id="inventory-detail-table">
                            <thead>
                                <tr>
                                    <th data-sort="string">창고</th>
                                    <th data-sort="string">품목코드</th>
                                    <th data-sort="string">품목명</th>
                                    <th data-sort="string">유통기한</th>
                                    <th data-sort="number" class="text-right">현재고 (캔)</th>
                                    <th data-sort="number" class="text-right">자산 금액</th>
                                    <th data-sort="string">업데이트 일시</th>
                                    <th>관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="8" class="empty-state">데이터를 불러오는 중...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- 재고 관리(추가/수정) 모달 -->
    <div id="inv-manage-modal" style="display: none;">
        <div class="modal-backdrop" onclick="event.target===this && InventoryPage.closeManageModal()">
            <div class="modal-content" style="max-width: 500px;">
                <h2 id="inv-modal-title">재고 추가</h2>
                <input type="hidden" id="inv-edit-id" value="">

                <div class="form-group">
                    <label class="form-label">스냅샷 일자</label>
                    <input type="date" class="form-input" id="inv-date">
                </div>
                <div class="form-group">
                    <label class="form-label">창고</label>
                    <select class="form-select" id="inv-ffc"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">품목</label>
                    <select class="form-select" id="inv-product"></select>
                </div>
                <div class="form-group">
                    <label class="form-label">유통기한</label>
                    <input type="date" class="form-input" id="inv-expiry">
                </div>
                <div class="form-group">
                    <label class="form-label">수량 (캔)</label>
                    <input type="number" class="form-input" id="inv-qty" min="0" value="0">
                </div>
                
                <div class="form-group" id="inv-updated-group" style="display: none;">
                    <label class="form-label" style="color: var(--accent-amber);">업데이트 일시 (관리자 전용)</label>
                    <input type="text" class="form-input" id="inv-updated-at" placeholder="YYYY-MM-DD HH:MM:SS">
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">* 미입력 시 현재 시각으로 자동 저장됩니다.</p>
                </div>

                <div class="modal-actions" style="margin-top: 24px;">
                    <button class="btn btn--secondary" onclick="InventoryPage.closeManageModal()">취소</button>
                    <button class="btn btn--primary" onclick="InventoryPage.saveInventory()">저장</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="/static/js/app.js"></script>
    <script>
        const InventoryPage = {

            // 샘플 데이터: 창고별, 품목별 실제 데이터
            sampleFfcs: [
                { id: 'hub', name: '용인 메인창고' },
                { id: 'online', name: '온라인 FFC' },
                { id: 'offline', name: '오프라인 FFC' },
                { id: 'buyout', name: '바이아웃 채널' },
                { id: 'coupang', name: '쿠팡 FFC' },
            ],
            sampleProducts: [
                { code: 'SN-001', name: '산양분유 1단계', unitPrice: 22500 },
                { code: 'SN-002', name: '산양분유 2단계', unitPrice: 21000 },
                { code: 'SN-003', name: '산양분유 3단계', unitPrice: 22500 },
                { code: 'SN-004', name: '산양분유 4단계', unitPrice: 20000 },
            ],
            // 창고별 × 품목별 실제 현재고 (없으면 해당 창고에 해당 품목 없음)
            sampleInventory: [
                { ffcId: 'hub', productCode: 'SN-001', qty: 42500, updated: '2026-06-19 09:15:42' },
                { ffcId: 'hub', productCode: 'SN-002', qty: 28000, updated: '2026-06-19 09:15:42' },
                { ffcId: 'hub', productCode: 'SN-003', qty: 22000, updated: '2026-06-19 09:15:42' },
                { ffcId: 'hub', productCode: 'SN-004', qty: 18500, updated: '2026-06-19 09:15:42' },
                { ffcId: 'online', productCode: 'SN-001', qty: 18200, updated: '2026-06-19 08:30:15' },
                { ffcId: 'online', productCode: 'SN-003', qty: 8750, updated: '2026-06-19 08:30:15' },
                { ffcId: 'offline', productCode: 'SN-002', qty: 12400, updated: '2026-06-18 17:45:08' },
                { ffcId: 'buyout', productCode: 'SN-001', qty: 15300, updated: '2026-06-18 16:20:33' },
                { ffcId: 'coupang', productCode: 'SN-001', qty: 5400, updated: '2026-06-19 07:55:20' },
                { ffcId: 'coupang', productCode: 'SN-004', qty: 2300, updated: '2026-06-19 07:55:20' },
            ],
            init() {
                this.buildFilters();
                this.renderInventoryTable();
                this.updateKPIs();
            },

            getProduct(code) {
                return this.sampleProducts.find(p => p.code === code);
            },
            getFfc(id) {
                return this.sampleFfcs.find(f => f.id === id);
            },

            buildFilters() {
                const filterGroup = document.getElementById('ffc-checkbox-filter');
                // 실제 데이터에 존재하는 창고만 필터로 표시
                const ffcIds = [...new Set(this.sampleInventory.map(i => i.ffcId))];
                let html = '<label><input type="checkbox" value="all" checked onchange="InventoryPage.onFilterAll(this)"> 전체</label>';
                ffcIds.forEach(id => {
                    const ffc = this.getFfc(id);
                    html += `<label><input type="checkbox" value="${id}" checked onchange="InventoryPage.onFilterChange()"> ${ffc ? ffc.name : id}</label>`;
                });
                filterGroup.innerHTML = html;
            },

            renderInventoryTable() {
                const tbody = document.querySelector('#inventory-detail-table tbody');
                const checked = this.getCheckedFfcs();

                const rows = this.sampleInventory
                    .filter(inv => checked.includes(inv.ffcId) || checked.includes(inv.warehouse_id))
                    .map(inv => {
                        const ffc = this.getFfc(inv.ffcId || inv.warehouse_id);
                        const prod = this.getProduct(inv.productCode);
                        const value = inv.totalValueKrw || 0;
                        const ffcName = ffc ? ffc.name : (inv.warehouse_name || inv.ffcId);
                        
                        return `
                            <tr>
                                <td>${ffcName}</td>
                                <td class="mono">${inv.productCode}</td>
                                <td>${prod ? prod.name : inv.product_name}</td>
                                <td class="mono">${inv.expiry_date || '-'}</td>
                                <td class="text-right mono" style="font-weight:600;">${Format.number(inv.qty)}</td>
                                <td class="text-right mono">${Format.currency(value)}</td>
                                <td style="color: var(--text-muted);">${inv.updated || '-'}</td>
                                <td>
                                    <div class="btn-group">
                                        <button class="btn btn--secondary btn--sm" onclick="InventoryPage.showManageModal(${inv.id})">수정</button>
                                        <button class="btn btn--danger btn--sm" onclick="InventoryPage.deleteInventory(${inv.id})">삭제</button>
                                    </div>
                                </td>
                            </tr>`;
                    });

                tbody.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="8" class="empty-state">선택된 창고에 데이터가 없습니다.</td></tr>';
            },

            getCheckedFfcs() {
                const filterGroup = document.getElementById('ffc-checkbox-filter');
                return Array.from(filterGroup.querySelectorAll('input[type="checkbox"]:not([value="all"]):checked')).map(cb => cb.value);
            },

            onFilterAll(checkbox) {
                const filterGroup = document.getElementById('ffc-checkbox-filter');
                filterGroup.querySelectorAll('input[type="checkbox"]:not([value="all"])').forEach(cb => { cb.checked = checkbox.checked; });
                this.renderInventoryTable();
                this.updateKPIs();
            },

            onFilterChange() {
                const filterGroup = document.getElementById('ffc-checkbox-filter');
                const checkboxes = filterGroup.querySelectorAll('input[type="checkbox"]:not([value="all"])');
                const allCb = filterGroup.querySelector('input[value="all"]');
                allCb.checked = Array.from(checkboxes).every(cb => cb.checked);
                this.renderInventoryTable();
                this.updateKPIs();
            },

            updateKPIs() {
                const checked = this.getCheckedFfcs();
                const filtered = this.sampleInventory.filter(inv => checked.includes(inv.ffcId));
                let totalQty = 0, totalValue = 0;
                filtered.forEach(inv => {
                    const prod = this.getProduct(inv.productCode);
                    totalQty += inv.qty;
                    totalValue += inv.totalValueKrw || 0;
                });

                document.getElementById('inv-total-qty').textContent = Format.number(totalQty);
                document.getElementById('inv-total-value').textContent = Format.currency(totalValue);
                document.getElementById('inv-ffc-count').textContent = [...new Set(filtered.map(i => i.ffcId || i.warehouse_id))].length;
            },

            // 재고 CRUD 모달 로직
            showManageModal(editId = null) {
                const isEdit = !!editId;
                document.getElementById('inv-modal-title').textContent = isEdit ? '재고 수정' : '재고 추가';
                document.getElementById('inv-edit-id').value = editId || '';
                
                // Select boxes
                document.getElementById('inv-ffc').innerHTML = this.sampleFfcs.map(f => `<option value="${f.id}">${f.name}</option>`).join('');
                document.getElementById('inv-product').innerHTML = this.sampleProducts.map(p => `<option value="${p.code}">${p.name}</option>`).join('');
                
                const role = window._currentUserRole;
                const isAdmin = role === 'ADMIN' || role === 'OPERATOR';
                const updatedGroup = document.getElementById('inv-updated-group');
                
                if (isEdit) {
                    const inv = this.sampleInventory.find(i => i.id === editId);
                    if (inv) {
                        document.getElementById('inv-date').value = inv.snapshot_date || Format.todayShort();
                        document.getElementById('inv-ffc').value = inv.warehouse_id || inv.ffcId;
                        document.getElementById('inv-product').value = inv.productCode;
                        document.getElementById('inv-expiry').value = inv.expiry_date || '';
                        document.getElementById('inv-qty').value = inv.qty || 0;
                        document.getElementById('inv-updated-at').value = inv.updated || '';
                    }
                    if (isAdmin) updatedGroup.style.display = 'block';
                    else updatedGroup.style.display = 'none';
                } else {
                    document.getElementById('inv-date').value = Format.todayShort();
                    document.getElementById('inv-expiry').value = '';
                    document.getElementById('inv-qty').value = 0;
                    document.getElementById('inv-updated-at').value = '';
                    updatedGroup.style.display = 'none'; // 숨김 (자동 생성)
                }
                
                document.getElementById('inv-manage-modal').style.display = 'block';
            },

            closeManageModal() {
                document.getElementById('inv-manage-modal').style.display = 'none';
            },

            async saveInventory() {
                const editId = parseInt(document.getElementById('inv-edit-id').value) || null;
                const ffcId = parseInt(document.getElementById('inv-ffc').value);
                const prodCode = document.getElementById('inv-product').value;
                const qty = parseInt(document.getElementById('inv-qty').value) || 0;
                
                const ffc = this.getFfc(ffcId);
                const prod = this.getProduct(prodCode);
                
                const payload = {
                    snapshot_date: document.getElementById('inv-date').value || Format.todayShort(),
                    warehouse_id: ffcId,
                    warehouse_name: ffc ? ffc.name : null,
                    product_code: prodCode,
                    product_name: prod ? prod.name : null,
                    expiry_date: document.getElementById('inv-expiry').value || null,
                    qty_cans: qty,
                    updated_at: document.getElementById('inv-updated-at').value || null,
                };
                
                try {
                    if (editId) {
                        await API.put(`/api/inventory-snapshot/${editId}`, payload);
                        Toast.show('재고 수정 완료', 'success');
                    } else {
                        await API.post('/api/inventory-snapshot', payload);
                        Toast.show('재고 추가 완료', 'success');
                    }
                    this.closeManageModal();
                    await this.load();
                } catch(e) {
                    console.error(e);
                }
            },

            async deleteInventory(id) {
                if (!confirm('정말로 이 재고 기록을 삭제하시겠습니까?')) return;
                try {
                    await API.delete(`/api/inventory-snapshot/${id}`);
                    Toast.show('재고 삭제 완료', 'success');
                    await this.load();
                } catch(e) {
                    console.error(e);
                }
            },

            async load() {
                try {
                    const [summary, ffcs, products, recs] = await Promise.all([
                        API.get('/api/inventory/summary'),
                        API.get('/api/warehouses'),
                        API.get('/api/products'),
                        // API.get('/api/inventory/transfer-recommendations'), // Removed old endpoint
                    ]);
                    // Replace sample data with API data if available
                    if (summary && summary.length) {
                        const newInventory = [];
                        summary.forEach(wh => {
                            if (wh.products) {
                                wh.products.forEach(p => {
                                    if (p.batches && p.batches.length) {
                                        p.batches.forEach(b => {
                                            newInventory.push({
                                                id: b.snapshot_id,
                                                warehouse_id: wh.warehouse_id,
                                                ffcId: wh.warehouse_id || wh.warehouse_name,
                                                warehouse_name: wh.warehouse_name,
                                                productCode: p.product_code || p.product_name,
                                                product_name: p.product_name,
                                                qty: b.qty_cans || 0,
                                                totalValueKrw: b.total_value_krw || 0,
                                                expiry_date: b.expiry_date || '',
                                                updated: b.updated_at || '',
                                                snapshot_date: b.snapshot_date || Format.todayShort(),
                                            });
                                        });
                                    }
                                });
                            }
                        });
                        if (newInventory.length > 0) {
                            this.sampleInventory = newInventory;
                        }
                    }
                    if (ffcs && ffcs.length) {
                        this.sampleFfcs = ffcs.map(f => ({ id: f.id || f.ffc_id || f.warehouse_name, name: f.name || f.warehouse_name || f.ffc_name }));
                    }
                    if (products && products.length) {
                        this.sampleProducts = products.map(p => ({
                            id: p.id,
                            code: p.product_code || p.code,
                            name: p.product_name || p.name,
                            unitPrice: p.unit_price || p.unitPrice || p.purchase_price || 0
                        }));
                    }
                    this.init();
                } catch(e) {
                    // API not available — use sample data
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            Theme.init();
            InventoryPage.init();
            InventoryPage.load();

            document.getElementById('inventory-upload').addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                e.target.value = '';
                const formData = new FormData();
                formData.append('file', file);
                try {
                    const result = await API.postFormData('/api/inventory-snapshot/upload', formData);
                    Toast.show(`${result.message} (${result.rows_inserted}건 추가, ${result.rows_updated}건 수정)`, 'success');
                    InventoryPage.load();
                } catch(err) {
                    // Error already shown by API handler
                }
            });
        });
    </script>
</body>
</html>
