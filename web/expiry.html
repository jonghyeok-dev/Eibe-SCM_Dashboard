<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIBE SCM | 유통기한 관리</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="app-sidebar">
            <button class="sidebar-toggle-btn" onclick="Sidebar.toggle()" title="사이드바 접기/펼치기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <div class="sidebar-brand" style="justify-content: center;">
                <h1 style="font-size: 1.1rem; letter-spacing: -0.5px;">EIBE SCM System</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span><span>요약</span></a>
                <a href="/inventory" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span><span>현재고</span></a>
                <a href="/expiry" class="nav-item active"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span><span>폐기</span></a>
                <a href="/order-plan" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span>발주</span></a>
                <a href="/matching" class="nav-item"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4a2 2 0 012 2v9a2 2 0 01-2 2H8a2 2 0 01-2-2v-4"/></svg></span><span>입고</span></a>
                <div class="nav-group">
                    <a href="/users" class="nav-parent"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span><span>설정</span></a>
                    <div class="nav-sub">
                        <a href="/users#template-header">데이터 양식</a>
                        <a href="/users#warehouse-header">창고 관리</a>
                        <a href="/users#product-header">품목 관리</a>
                        <a href="/users#user-header">사용자 관리</a>
                        <a href="/users#snapshot-header">백업/스냅샷</a>
                        <a href="/users#moq-header">이관 MOQ</a>
                    </div>
                </div>
            </nav>
            <div class="sidebar-user-info">
                <div class="user-avatar">U</div>
                <div class="user-meta">
                    <div class="user-name">로딩 중...</div>
                    <div class="user-role">-</div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="theme-toggle" onclick="Theme.toggle()">
                    <span class="toggle-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
                    <span class="theme-toggle-text">Dark</span>
                </button>
                <button class="btn btn--secondary btn--sm" onclick="Auth.logout()" style="width:100%; text-align:center;">로그아웃</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title" id="main-page-title">폐기</h1>
                    <p class="page-subtitle" id="main-page-subtitle">유통기한 임박 관리</p>
                </div>
            </div>

            <section class="kpi-grid section-gap">
                <div class="kpi-card">
                    <span class="kpi-label">유통기한 임박 품목</span>
                    <div class="kpi-value" id="expiry-risk-count">7</div>
                    <div class="kpi-sub">90일 이내 만료</div>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">폐기 예상 총액</span>
                    <div class="kpi-value" id="expiry-risk-total">₩18,600,000</div>
                    <div class="kpi-sub">판매 불가 예상 금액</div>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">위험 등급 품목</span>
                    <div class="kpi-value" id="expiry-critical">2</div>
                    <div class="kpi-sub">30일 이내 만료</div>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">관리 대상 창고</span>
                    <div class="kpi-value" id="expiry-ffc-count">3</div>
                    <div class="kpi-sub">임박 재고 보유 창고</div>
                </div>
            </section>

            <section class="card section-gap">
                <div class="card-header" style="flex-direction: column; align-items: flex-start; gap: var(--space-sm);">
                    <h2 class="card-title">FEFO 기반 유통기한 임박 및 폐기 예상</h2>
                    <div class="filter-group" style="margin-top: var(--space-md); padding: var(--space-sm); background-color: var(--surface-hover); border-radius: 8px; width: 100%;">
                        <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px;">조회 필터</div>
                        <div id="warehouse-filter-container" style="display: flex; gap: var(--space-md); flex-wrap: wrap;"></div>
                    </div>
                </div>
                <div class="card-body card-body--no-pad">
                    <div class="data-table-wrapper">
                        <table class="data-table" id="expiry-table">
                            <thead>
                                <tr>
                                    <th>창고</th>
                                    <th>품명</th>
                                    <th>유통기한</th>
                                    <th class="text-right">수량 (캔)</th>
                                    <th class="text-right">판매가능일</th>
                                    <th class="text-center">소진예상일</th>
                                    <th class="text-right">추가 필요 판매량 (캔수)</th>
                                    <th class="text-right">폐기 예상금액</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="/static/js/app.js"></script>
    <script>
        const ExpiryPage = {
            allData: [],
            sampleData: [
                { warehouse: '쿠팡 FFC', product_code: 'SN-004', product_name: '산양분유 4단계', batch: 'B2025-0412', qty: 1200, expiry_date: '2026-07-05', remaining_days: 17, status: '위험', disposal_value: 7600000 },
                { warehouse: '오프라인 FFC', product_code: 'SN-003', product_name: '산양분유 3단계', batch: 'B2025-0389', qty: 800, expiry_date: '2026-07-12', remaining_days: 24, status: '위험', disposal_value: 5625000 },
                { warehouse: '용인 메인창고', product_code: 'SN-001', product_name: '산양분유 1단계', batch: 'B2025-0356', qty: 3500, expiry_date: '2026-08-20', remaining_days: 63, status: '주의', disposal_value: 7875000 },
                { warehouse: '온라인 FFC', product_code: 'SN-002', product_name: '산양분유 2단계', batch: 'B2025-0378', qty: 2100, expiry_date: '2026-08-25', remaining_days: 68, status: '주의', disposal_value: 3150000 },
                { warehouse: '바이아웃 채널', product_code: 'SN-001', product_name: '산양분유 1단계', batch: 'B2025-0401', qty: 1800, expiry_date: '2026-09-01', remaining_days: 75, status: '양호', disposal_value: 0 },
                { warehouse: '용인 메인창고', product_code: 'SN-002', product_name: '산양분유 2단계', batch: 'B2025-0345', qty: 5200, expiry_date: '2026-09-15', remaining_days: 89, status: '양호', disposal_value: 0 },
                { warehouse: '쿠팡 FFC', product_code: 'SN-001', product_name: '산양분유 1단계', batch: 'B2025-0399', qty: 4600, expiry_date: '2026-09-18', remaining_days: 92, status: '양호', disposal_value: 0 },
            ],

            async load() {
                try {
                    const data = await API.get('/api/expiry/summary');
                    this.allData = data && data.items ? data.items : (Array.isArray(data) ? data : this.sampleData);
                } catch(e) {
                    this.allData = this.sampleData;
                }
                
                const whNames = [...new Set(this.allData.map(item => item.warehouse_name || item.warehouse))];
                FilterUI.init('warehouse-filter-container', whNames, (selectedWh) => {
                    this.renderTable(selectedWh);
                });

                this.renderTable(whNames);
                this.updateKPIs(whNames);
            },

            renderTable(selectedWarehouses) {
                const tbody = document.querySelector('#expiry-table tbody');
                const filtered = this.allData.filter(d => selectedWarehouses.includes(d.warehouse_name || d.warehouse));

                if (!filtered.length) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center">데이터가 없습니다.</td></tr>';
                    return;
                }

                tbody.innerHTML = filtered.map(d => {
                    const valueColor = d.disposal_value > 0 ? (d.remaining_days <= 30 ? 'var(--accent-red)' : 'var(--accent-amber)') : 'var(--text-muted)';
                    return `
                        <tr>
                            <td>${d.warehouse_name || d.warehouse}</td>
                            <td>${d.product_name}</td>
                            <td>${d.expiry_date}</td>
                            <td class="text-right mono">${Format.number(d.qty)}</td>
                            <td class="text-right"><span class="badge ${d.remaining_days <= 30 ? 'badge--danger' : 'badge--warning'}">${d.remaining_days}일</span></td>
                            <td class="text-center">-</td>
                            <td class="text-right mono">-</td>
                            <td class="text-right mono" style="font-weight:600; color: ${valueColor};">${Format.currency(d.disposal_value)}</td>
                        </tr>`;
                }).join('');
            },

            updateKPIs(selectedWarehouses) {
                const filtered = this.allData.filter(d => selectedWarehouses.includes(d.warehouse_name || d.warehouse));
                document.getElementById('expiry-risk-count').textContent = filtered.filter(d => d.remaining_days <= 90).length;
                document.getElementById('expiry-risk-total').textContent = Format.currency(filtered.reduce((sum, d) => sum + (d.disposal_value || 0), 0));
                document.getElementById('expiry-critical').textContent = filtered.filter(d => d.remaining_days <= 30).length;
                document.getElementById('expiry-ffc-count').textContent = new Set(filtered.map(d => d.warehouse)).size;
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            ExpiryPage.load();
        });
    </script>
</body>
</html>
