<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM Dashboard | 재고 유통기한 상세</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <aside class="app-sidebar">
            <button class="sidebar-collapse-btn" onclick="Sidebar.toggle()" title="접기/펼치기">◀</button>
            <div class="sidebar-brand">
                <div class="logo-icon">S</div>
                <h1>SCM Dashboard</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="/"><span class="nav-icon">●</span><span>Dashboard</span></a>
                <a href="/inventory"><span class="nav-icon">●</span><span>Inventory</span></a>
                <a href="/expiry" class="active"><span class="nav-icon">●</span><span>Expiry</span></a>
                <a href="/order-plan"><span class="nav-icon">●</span><span>Order Plan</span></a>
                <a href="/matching"><span class="nav-icon">●</span><span>Matching</span></a>
                <a href="/users"><span class="nav-icon">●</span><span>Admin</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="sidebar-user-avatar">A</div>
                    <div class="user-details">
                        <span class="user-name" id="sidebar-user-name">Guest</span>
                        <span class="user-role" id="sidebar-user-role"></span>
                    </div>
                </div>
                <button id="theme-toggle" class="theme-toggle" onclick="Theme.toggle()">
                    <span class="toggle-icon">☾</span>
                    <span class="theme-toggle-text">Dark</span>
                </button>
                <button class="btn btn--secondary btn--sm" onclick="Auth.logout()" style="width:100%; text-align:center;">로그아웃</button>
            </div>
        </aside>

        <main class="main-content">
            <section class="card">
                <div class="card-header">
                    <h2 class="card-title">FEFO 기반 유통기한 임박 및 폐기 예상</h2>
                    <button class="btn btn--secondary" onclick="window.location.reload()">새로고침</button>
                </div>
                <div class="card-body card-body--no-pad">
                    <div class="data-table-wrapper">
                        <table class="data-table" id="expiry-table">
                            <thead>
                                <tr>
                                    <th>창고</th>
                                    <th>품목</th>
                                    <th>잔여 수량 (캔)</th>
                                    <th>유통기한</th>
                                    <th>잔여일수</th>
                                    <th>리스크 금액</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="6">
                                        <div class="empty-state">
                                            <p>데이터가 없습니다.</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Theme.init();
        });
    </script>
</body>
</html>
